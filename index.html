<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearshift — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f0e; --surface: #141716; --surface2: #1c1f1d;
    --border: #252927; --border2: #2f3330;
    --text: #e8ebe9; --text-dim: #7a8a7d; --text-dimmer: #4a5a4d;
    --accent: #5bffa0; --accent-dim: #2a7a4a; --accent-glow: rgba(91,255,160,0.12);
    --danger: #ff6b6b;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(91,255,160,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 80%, rgba(91,255,160,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 48px 44px;
    width: 400px;
    max-width: calc(100vw - 32px);
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
    border-radius: 16px 16px 0 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #0d0f0e;
    font-family: 'Syne', sans-serif;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.05em;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dimmer); }

  .login-btn {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: var(--accent);
    color: #0d0f0e;
    border: none;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .login-btn:hover { background: #7fffb8; transform: translateY(-1px); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-msg {
    display: none;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--danger);
    margin-top: 16px;
  }

  .error-msg.show { display: block; }

  .footer-note {
    margin-top: 24px;
    font-size: 10px;
    color: var(--text-dimmer);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-name">CLEARSHIFT</div>
  </div>
  <h1>Sign in</h1>
  <p class="subtitle">Customer Onboarding Portal</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="error-msg" id="errorMsg"></div>

  <div class="footer-note">
    Access is restricted to authorised personnel only.<br>
    All access is logged for compliance purposes.
  </div>
</div>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const err      = document.getElementById('errorMsg');

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.classList.remove('show');

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || 'Login failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      window.location.href = '/';

    } catch(e) {
      showError('Connection error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.classList.add('show');
  }
</script>
</body>
</html>
